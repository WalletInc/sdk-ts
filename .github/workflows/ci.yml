name: Dockerize

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on: [push, pull_request]

env:
  TEST_ENV: test

jobs:
  dev:
    # Job name is Build Docker Image
    name: Notify on Slack
    # This job runs on Linux
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      # Checkout latest push
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "14.15.3"
          check-latest: true
          registry-url: "https://registry.npmjs.org"
          # scope: "@walletinc"

      - name: Send message to Slack
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} > .gitdiff-names || touch .gitdiff-names
          git log --pretty=%B --ancestry-path ${{ github.event.before }}..${{ github.sha }} > .gitdiff-commits || touch .gitdiff-commits
          python3 scripts/slack.py .gitdiff-names .gitdiff-commits ${{ secrets.SLACK_WEBHOOK_URL }} ${{ github.actor }} ${{ github.repository }} ${{ github.run_id }} $GITHUB_REF
          # curl -X POST -H 'Content-type: application/json' --data '{"blocks": [{"type": "section", "text": {"type": "mrkdwn", "text": "New push by: ${{ github.actor }} to `${{ github.repository }}` :confetti_ball:"}}]}' ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send failure message to Slack
        if: ${{ failure() }}
        run: |
          python3 scripts/failure.py ${{ secrets.SLACK_WEBHOOK_URL }} ${{ github.actor }} ${{ github.repository }} $GITHUB_REF ${{ secrets.SQUADCAST_API_ENDPOINT }}

  test:
    # Job name is Build Docker Image
    name: Publish to npm
    # This job runs on Linux
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write   # OIDC token npm exchanges for a short-lived publish credential (Trusted Publishing)
      contents: read
    steps:
      # Checkout latest push
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          check-latest: true
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) needs a modern npm; Node 20 ships npm 10, which predates it.
      # Upgrade to a version that supports OIDC publishing (npm >= 11.5.1). No token is used:
      # authentication comes from the job's id-token (OIDC), which npm exchanges for a short-lived
      # publish credential. Requires a Trusted Publisher for the wallet package on npmjs.com pointing
      # at WalletInc/sdk-ts's ci.yml. This replaces the old NPMJS_AUTOMATION_TOKEN / .npmrc flow.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest && npm --version

      # - name: Install NPM packages
      #   run: npm install && echo "Installed npm dependencies"
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_ACCESS_TOKEN }}

      # - name: Build
      #   run: npm run build:nodocs && echo "Build files generated"

      # - name: Lint OpenAPI
      #   run: npm run lint-openapi

      # - name: Setup .env file
      #   run: |
      #     echo -en "DB_HOST=$DB_HOST\nDB_USER=$DB_USER\nDB_PASS=$DB_PASS\nDB_NAME=$DB_NAME" > .env

      # - name: Run the tests
      #   run: npm test

      # - name: Publish to Github Packages
      #   run: cd typescript && npm publish && cd ../
      #   continue-on-error: true
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publishes with provenance via Trusted Publishing (OIDC). No NODE_AUTH_TOKEN: the
      # id-token: write permission on this job lets npm exchange the GitHub OIDC token for a
      # short-lived publish credential. No continue-on-error, so a failed publish is visible.
      - name: Publish package on NPM
        run: npm publish --access public

      # - name: Upload test coverage
